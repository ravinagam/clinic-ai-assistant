version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chat-widget:
    build:
      context: ./frontend/chat-widget
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_CLINIC_NAME: ${VITE_CLINIC_NAME:-City Health Clinic}
    ports:
      - "3002:80"

  staff-portal:
    build:
      context: ./frontend/staff-portal
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_CLINIC_NAME: ${VITE_CLINIC_NAME:-City Health Clinic}
    ports:
      - "3003:80"

  doctor-portal:
    build:
      context: ./frontend/doctor-portal
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_CLINIC_NAME: ${VITE_CLINIC_NAME:-City Health Clinic}
    ports:
      - "3004:80"

volumes:
  postgres_data:
  redis_data:
